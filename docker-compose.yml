services:
  pki-init:
    build:
      context: ./backend
    container_name: pymc_glass_pki_init
    restart: "no"
    env_file:
      - ./backend/.env
    command: ["python", "-m", "app.scripts.pki_init"]
    volumes:
      - ./pki:/app/data/pki
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: pymc_glass_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pymc_glass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pymc_glass"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pymc_glass_mosquitto
    restart: unless-stopped
    depends_on:
      pki-init:
        condition: service_completed_successfully
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./pki:/mosquitto/pki:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 8883 --cafile /mosquitto/pki/ca.crt.pem --cert /mosquitto/pki/mqtt-backend-client.crt.pem --key /mosquitto/pki/mqtt-backend-client.key.pem -t healthcheck -m ok >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15

  backend:
    build:
      context: ./backend
    container_name: pymc_glass_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pki-init:
        condition: service_completed_successfully
      mosquitto:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./pki:/app/data/pki
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: node:22-alpine
    container_name: pymc_glass_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_API_BASE_URL: ""
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
  mosquitto_data:
  mosquitto_log:

